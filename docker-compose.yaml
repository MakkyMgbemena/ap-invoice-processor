services:
  api:
    build: .
    ports:
      - "8082:8080"
    volumes:
      - ./sheets_creds.json:/app/sheets_creds.json:ro
      - .:/app
      - ./ocr-pipeline-sa-key.json:/secrets/ocr-pipeline-sa-key.json:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload
    env_file:
      - .env
    environment:
      PORT: "8080"
    healthcheck:
      test:
        - CMD-SHELL
        - "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8080/invoices/\")'"
      interval: 10s
      timeout: 5s
      retries: 3
    restart: on-failure

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: ap-invoice-processor-streamlit-1
    ports:
      - "8502:8501"
    environment:
      - API_URL=http://api:8080
    depends_on:
      - api
    restart: unless-stopped
